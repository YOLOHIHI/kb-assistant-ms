apiVersion: apps/v1
kind: Deployment
metadata:
  name: kb-eureka-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kb-eureka-server
  template:
    metadata:
      labels:
        app: kb-eureka-server
    spec:
      containers:
        - name: kb-eureka-server
          image: kb-eureka-server
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          env:
            - name: SERVER_PORT
              value: "8761"
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            failureThreshold: 45
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kb-eureka-server
spec:
  selector:
    app: kb-eureka-server
  ports:
    - name: http
      port: 8761
      targetPort: 8761
