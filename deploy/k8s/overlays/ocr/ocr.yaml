apiVersion: apps/v1
kind: Deployment
metadata:
  name: kb-ocr-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kb-ocr-service
  template:
    metadata:
      labels:
        app: kb-ocr-service
    spec:
      containers:
        - name: kb-ocr-service
          image: kb-ocr-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8070
          env:
            - name: KB_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_INTERNAL_TOKEN
            - name: OCR_LANG
              value: chi_sim+eng
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8070
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8070
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kb-ocr-service
spec:
  selector:
    app: kb-ocr-service
  ports:
    - name: http
      port: 8070
      targetPort: 8070
