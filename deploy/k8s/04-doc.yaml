apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kb-doc-pvc
  namespace: kb-assistant
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kb-doc-service
  namespace: kb-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kb-doc-service
  template:
    metadata:
      labels:
        app: kb-doc-service
    spec:
      containers:
        - name: kb-doc-service
          image: kb-doc-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /internal/health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /internal/health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          env:
            - name: KB_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_INTERNAL_TOKEN
            - name: KB_INDEX_URL
              value: "http://kb-index-service:8082"
            - name: KB_DOC_DATA_DIR
              value: "/data"
            - name: KB_OCR_URL
              value: "http://kb-ocr-service:8070"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kb-doc-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kb-doc-service
  namespace: kb-assistant
spec:
  selector:
    app: kb-doc-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
