apiVersion: apps/v1
kind: Deployment
metadata:
  name: kb-index-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kb-index-service
  template:
    metadata:
      labels:
        app: kb-index-service
    spec:
      containers:
        - name: kb-index-service
          image: kb-index-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: KB_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_INTERNAL_TOKEN
            - name: KB_GATEWAY_URL
              value: http://kb-gateway:8080
            - name: KB_EMBEDDER_URL
              value: http://kb-embedder:8090
            - name: KB_DB_URL
              value: jdbc:postgresql://kb-postgres:5432/kb
            - name: KB_DB_USER
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_DB_USER
            - name: KB_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_DB_PASSWORD
            - name: EUREKA_ENABLED
              value: "false"
            - name: EUREKA_SERVER_URL
              value: http://kb-eureka-server:8761
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /internal/health
              port: 8082
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /internal/health
              port: 8082
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /internal/health
              port: 8082
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kb-index-service
spec:
  selector:
    app: kb-index-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
