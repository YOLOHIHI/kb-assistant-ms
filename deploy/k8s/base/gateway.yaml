apiVersion: apps/v1
kind: Deployment
metadata:
  name: kb-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kb-gateway
  template:
    metadata:
      labels:
        app: kb-gateway
    spec:
      containers:
        - name: kb-gateway
          image: kb-gateway
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: KB_ALLOW_INSECURE_DEFAULTS
              value: "false"
            - name: KB_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_INTERNAL_TOKEN
            - name: KB_DB_URL
              value: jdbc:postgresql://kb-postgres:5432/kb
            - name: KB_DB_USER
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_DB_USER
            - name: KB_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_DB_PASSWORD
            - name: KB_BOOTSTRAP_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_BOOTSTRAP_ADMIN_USER
            - name: KB_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_BOOTSTRAP_ADMIN_PASSWORD
            - name: KB_CRYPTO_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_CRYPTO_MASTER_KEY
            - name: KB_AI_URL
              value: http://kb-ai-service:8083
            - name: KB_DOC_URL
              value: http://kb-doc-service:8081
            - name: KB_INDEX_URL
              value: http://kb-index-service:8082
            - name: EUREKA_ENABLED
              value: "false"
            - name: EUREKA_SERVER_URL
              value: http://kb-eureka-server:8761
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /api/health/live
              port: 8080
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 8
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kb-gateway
spec:
  selector:
    app: kb-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
