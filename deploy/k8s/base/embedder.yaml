apiVersion: apps/v1
kind: Deployment
metadata:
  name: kb-embedder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kb-embedder
  template:
    metadata:
      labels:
        app: kb-embedder
    spec:
      containers:
        - name: kb-embedder
          image: kb-embedder
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: EMBED_MODEL
              value: BAAI/bge-small-zh-v1.5
            - name: EMBED_DEVICE
              value: cpu
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kb-embedder
spec:
  selector:
    app: kb-embedder
  ports:
    - name: http
      port: 8090
      targetPort: 8090
