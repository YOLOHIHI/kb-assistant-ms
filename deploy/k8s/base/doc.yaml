apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kb-doc-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kb-doc-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kb-doc-service
  template:
    metadata:
      labels:
        app: kb-doc-service
    spec:
      containers:
        - name: kb-doc-service
          image: kb-doc-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: KB_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_INTERNAL_TOKEN
            - name: KB_INDEX_URL
              value: http://kb-index-service:8082
            - name: KB_DOC_DATA_DIR
              value: /data
            - name: KB_OCR_URL
              value: ""
            - name: EUREKA_ENABLED
              value: "false"
            - name: EUREKA_SERVER_URL
              value: http://kb-eureka-server:8761
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /internal/health
              port: 8081
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /internal/health
              port: 8081
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /internal/health
              port: 8081
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kb-doc-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kb-doc-service
spec:
  selector:
    app: kb-doc-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
