apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kb-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kb-postgres
spec:
  clusterIP: None
  selector:
    app: kb-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kb-postgres
spec:
  serviceName: kb-postgres
  replicas: 1
  selector:
    matchLabels:
      app: kb-postgres
  template:
    metadata:
      labels:
        app: kb-postgres
    spec:
      containers:
        - name: kb-postgres
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: kb
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kb-secrets
                  key: KB_DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kb-postgres-pvc
