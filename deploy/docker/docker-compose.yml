services:
  kb-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${KB_DB_NAME:-kb}
      POSTGRES_USER: ${KB_DB_USER:-kb}
      POSTGRES_PASSWORD: ${KB_DB_PASSWORD:-kb-demo-password}
    volumes:
      - kb-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  kb-embedder:
    build:
      context: ../../services/kb-embedder
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 15s

  kb-ocr-service:
    profiles: ["ocr"]
    build:
      context: ../../services/kb-ocr-service
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8070/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 15s

  kb-eureka-server:
    profiles: ["eureka"]
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.eureka
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8761/actuator/health > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

  kb-index-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.index
    environment:
      KB_INTERNAL_TOKEN: ${KB_INTERNAL_TOKEN:-change-me-internal-token}
      KB_GATEWAY_URL: ${KB_GATEWAY_URL:-http://kb-gateway:8080}
      KB_EMBEDDER_URL: ${KB_EMBEDDER_URL:-http://kb-embedder:8090}
      KB_DB_URL: jdbc:postgresql://kb-db:5432/${KB_DB_NAME:-kb}
      KB_DB_USER: ${KB_DB_USER:-kb}
      KB_DB_PASSWORD: ${KB_DB_PASSWORD:-kb-demo-password}
      EUREKA_ENABLED: ${EUREKA_ENABLED:-false}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://kb-eureka-server:8761}
    ports:
      - "8082:8082"
    depends_on:
      kb-db:
        condition: service_healthy
      kb-embedder:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8082/internal/health > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  kb-doc-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.doc
    environment:
      KB_INTERNAL_TOKEN: ${KB_INTERNAL_TOKEN:-change-me-internal-token}
      KB_INDEX_URL: ${KB_INDEX_URL:-http://kb-index-service:8082}
      KB_DOC_DATA_DIR: /data
      KB_OCR_URL: ${KB_OCR_URL:-}
      EUREKA_ENABLED: ${EUREKA_ENABLED:-false}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://kb-eureka-server:8761}
    ports:
      - "8081:8081"
    volumes:
      - kb-doc-data:/data
    depends_on:
      kb-index-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8081/internal/health > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  kb-ai-service:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.ai
    environment:
      KB_INTERNAL_TOKEN: ${KB_INTERNAL_TOKEN:-change-me-internal-token}
      KB_INDEX_URL: ${KB_INDEX_URL:-http://kb-index-service:8082}
      KB_DB_URL: jdbc:postgresql://kb-db:5432/${KB_DB_NAME:-kb}
      KB_DB_USER: ${KB_DB_USER:-kb}
      KB_DB_PASSWORD: ${KB_DB_PASSWORD:-kb-demo-password}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      SILICONFLOW_BASE_URL: ${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      SILICONFLOW_MODEL: ${SILICONFLOW_MODEL:-}
      EUREKA_ENABLED: ${EUREKA_ENABLED:-false}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://kb-eureka-server:8761}
    ports:
      - "8083:8083"
    depends_on:
      kb-db:
        condition: service_healthy
      kb-index-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8083/internal/health > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  kb-gateway:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.gateway
    environment:
      KB_ALLOW_INSECURE_DEFAULTS: ${KB_ALLOW_INSECURE_DEFAULTS:-false}
      KB_INTERNAL_TOKEN: ${KB_INTERNAL_TOKEN:-change-me-internal-token}
      KB_DB_URL: jdbc:postgresql://kb-db:5432/${KB_DB_NAME:-kb}
      KB_DB_USER: ${KB_DB_USER:-kb}
      KB_DB_PASSWORD: ${KB_DB_PASSWORD:-kb-demo-password}
      KB_BOOTSTRAP_ADMIN_USER: ${KB_BOOTSTRAP_ADMIN_USER:-admin}
      KB_BOOTSTRAP_ADMIN_PASSWORD: ${KB_BOOTSTRAP_ADMIN_PASSWORD:-change-me-admin-password}
      KB_CRYPTO_MASTER_KEY: ${KB_CRYPTO_MASTER_KEY:-change-me-crypto-master-key-32-bytes}
      KB_AI_URL: ${KB_AI_URL:-http://kb-ai-service:8083}
      KB_DOC_URL: ${KB_DOC_URL:-http://kb-doc-service:8081}
      KB_INDEX_URL: ${KB_INDEX_URL:-http://kb-index-service:8082}
      EUREKA_ENABLED: ${EUREKA_ENABLED:-false}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://kb-eureka-server:8761}
    ports:
      - "8080:8080"
    depends_on:
      kb-db:
        condition: service_healthy
      kb-ai-service:
        condition: service_healthy
      kb-doc-service:
        condition: service_healthy
      kb-index-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/api/health > /dev/null"]
      interval: 20s
      timeout: 10s
      retries: 25
      start_period: 90s

volumes:
  kb-doc-data:
  kb-db-data:
