name: publish-images

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: kb-gateway
            context: .
            file: deploy/docker/Dockerfile.gateway
          - image: kb-index-service
            context: .
            file: deploy/docker/Dockerfile.index
          - image: kb-doc-service
            context: .
            file: deploy/docker/Dockerfile.doc
          - image: kb-ai-service
            context: .
            file: deploy/docker/Dockerfile.ai
          - image: kb-eureka-server
            context: .
            file: deploy/docker/Dockerfile.eureka
          - image: kb-embedder
            context: services/kb-embedder
            file: services/kb-embedder/Dockerfile
          - image: kb-ocr-service
            context: services/kb-ocr-service
            file: services/kb-ocr-service/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Warm frontend dependency cache
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize registry owner
        id: registry
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.registry.outputs.owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
